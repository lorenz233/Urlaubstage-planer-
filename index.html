<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Urlaubsrechner · Deutschland</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#f1f3f4;
      --bg2:#e8eaed;
      --surface:#ffffff;
      --border:#dadce0;
      --ink:#3c4043;
      --ink2:#5f6368;
      --ink3:#80868b;
      --teal:#0f9d58;
      --teal-light:#e6f4ea;
      --teal-mid:rgba(15,157,88,0.12);
      --red:#d93025;
      --red-light:#fce8e6;
      --red-mid:rgba(217,48,37,0.10);
      --blue:#1a73e8;
      --blue-light:#e8f0fe;
      --blue-mid:rgba(26,115,232,0.12);
      --accent:#1a73e8;
      --shadow:0 1px 2px rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15);
      --shadow-lg:0 1px 3px rgba(60,64,67,.3),0 4px 8px 3px rgba(60,64,67,.15);
      --radius:8px;
    }

    html{font-size:16px}
    body{
      background:var(--bg);
      font-family:'Roboto',sans-serif;
      color:var(--ink);
      min-height:100vh;
      padding:0 0 60px;
    }

    /* ── Header ── */
    .page-header{
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:0 24px;
      height:64px;
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:24px;
      box-shadow:0 1px 3px rgba(60,64,67,.15);
    }
    .page-eyebrow{display:none}
    .header-icon{
      width:36px;height:36px;
      background:var(--accent);
      border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;flex-shrink:0;
    }
    .page-title{
      font-size:1.375rem;font-weight:400;
      color:var(--ink);letter-spacing:0;line-height:1;
    }
    .page-sub{
      font-size:0.8rem;color:var(--ink3);
      margin-left:auto;font-weight:400;white-space:nowrap;
    }

    /* ── Layout ── */
    .layout{
      display:grid;
      grid-template-columns:300px 1fr;
      gap:20px;
      max-width:1120px;
      margin:0 auto;
      padding:0 24px;
    }

    /* ── Panels ── */
    .panel{
      background:var(--surface);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      border:1px solid var(--border);
    }

    .panel-title{
      font-size:0.6875rem;font-weight:500;letter-spacing:.07em;
      text-transform:uppercase;color:var(--ink2);margin-bottom:20px;
      display:flex;align-items:center;gap:8px
    }
    .panel-title span{
      background:var(--blue-light);color:var(--accent);
      border-radius:4px;padding:2px 8px;font-size:0.625rem;font-weight:500
    }

    /* ── Form ── */
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .field label{
      font-size:0.6875rem;font-weight:500;letter-spacing:.07em;
      text-transform:uppercase;color:var(--ink2)
    }
    .date-input-wrap{position:relative}
    .date-input-wrap svg{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      pointer-events:none;color:var(--ink3)
    }
    input[type=date]{
      font-family:'Roboto',sans-serif;
      font-size:0.875rem;font-weight:400;
      color:var(--ink);background:var(--surface);
      border:1px solid var(--border);border-radius:4px;
      padding:10px 40px 10px 12px;width:100%;outline:none;
      transition:border-color .15s,box-shadow .15s;cursor:pointer;
      -webkit-appearance:none;color-scheme:light;
    }
    input[type=date]:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--blue-mid)}
    input[type=date]:hover:not(:focus){border-color:var(--ink3)}

    /* ── Select dropdown ── */
    .select-wrap{position:relative}
    .select-wrap svg{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      pointer-events:none;color:var(--ink3)
    }
    select{
      font-family:'Roboto',sans-serif;
      font-size:0.875rem;font-weight:400;
      color:var(--ink);background:var(--surface);
      border:1px solid var(--border);border-radius:4px;
      padding:10px 40px 10px 12px;width:100%;outline:none;
      appearance:none;-webkit-appearance:none;cursor:pointer;
      transition:border-color .15s,box-shadow .15s;
    }
    select:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--blue-mid)}
    select:hover:not(:focus){border-color:var(--ink3)}

    /* ── Badge strip ── */
    .mv-badge{
      display:flex;align-items:center;gap:8px;
      background:var(--blue-light);border:1px solid rgba(26,115,232,.2);
      border-radius:4px;padding:8px 12px;margin-bottom:16px;
      font-size:0.75rem;color:var(--accent);font-weight:500
    }

    /* ── Calc button ── */
    .btn{
      font-family:'Roboto',sans-serif;
      font-size:0.875rem;font-weight:500;letter-spacing:.01em;
      background:var(--accent);
      color:#fff;border:none;border-radius:4px;
      padding:10px 24px;width:100%;cursor:pointer;
      box-shadow:0 1px 3px rgba(26,115,232,.4);
      transition:background .15s,box-shadow .15s;
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin-top:4px
    }
    .btn:hover{background:#1765cc;box-shadow:0 2px 6px rgba(26,115,232,.45)}
    .btn:active{background:#1557b0;box-shadow:none}

    /* ── Error ── */
    .error{
      margin-top:12px;background:var(--red-light);
      border:1px solid rgba(217,48,37,.2);color:var(--red);
      font-size:.8rem;border-radius:4px;padding:10px 14px;display:none
    }

    /* ── Right panel ── */
    .right-panel{display:flex;flex-direction:column;gap:16px}

    /* ── Stats grid ── */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .stat-card{
      background:var(--surface);border-radius:var(--radius);
      border:1px solid var(--border);
      box-shadow:var(--shadow);padding:16px;text-align:left;
      border-top:3px solid var(--border);
    }
    .stat-card.s-total  {border-top-color:var(--ink3)}
    .stat-card.s-vacation{border-top-color:var(--teal)}
    .stat-card.s-weekend {border-top-color:var(--blue)}
    .stat-card.s-holiday {border-top-color:var(--red)}

    .stat-icon{font-size:1.1rem;margin-bottom:8px}
    .stat-label{
      font-size:.6875rem;font-weight:500;letter-spacing:.05em;
      text-transform:uppercase;color:var(--ink3);margin-bottom:4px;line-height:1.3
    }
    .stat-value{
      font-size:2rem;font-weight:300;line-height:1;
      color:var(--ink)
    }
    .stat-card.s-vacation .stat-value{color:var(--teal)}
    .stat-card.s-holiday  .stat-value{color:var(--red)}
    .stat-unit{font-size:.6875rem;color:var(--ink3);margin-top:3px;font-weight:400}

    /* ── Bottom split: calendar + holiday list ── */
    .bottom-split{display:grid;grid-template-columns:1fr 220px;gap:16px}

    /* ── Calendar ── */
    .cal-panel{
      background:var(--surface);border-radius:var(--radius);
      border:1px solid var(--border);
      box-shadow:var(--shadow);padding:20px;overflow:hidden
    }
    .cal-months{display:flex;flex-direction:column;gap:24px}
    .cal-month-title{
      font-size:.8rem;font-weight:500;
      color:var(--ink2);margin-bottom:10px;
      display:flex;align-items:center;gap:8px
    }
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .cal-dow{
      font-size:.625rem;font-weight:500;letter-spacing:.05em;
      text-transform:uppercase;color:var(--ink3);
      text-align:center;padding:4px 0
    }
    .cal-dow.weekend{color:var(--red)}
    .cal-day{
      border-radius:4px;padding:5px 2px;text-align:center;
      font-size:.75rem;font-weight:400;color:var(--ink2);
      position:relative;min-height:28px;display:flex;
      align-items:center;justify-content:center;flex-direction:column;
      transition:background .1s;line-height:1.1
    }
    .cal-day.empty{background:transparent}
    .cal-day.weekend{color:var(--ink3)}
    .cal-day.in-range{background:var(--teal-mid);color:var(--ink);font-weight:500}
    .cal-day.holiday{background:var(--red-mid);color:var(--red);font-weight:500}
    .cal-day.weekend.in-range{background:var(--blue-mid);color:var(--ink3)}
    .cal-day.today::after{
      content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
      width:4px;height:4px;border-radius:50%;background:var(--accent)
    }

    /* ── Holiday list ── */
    .hol-panel{
      background:var(--surface);border-radius:var(--radius);
      border:1px solid var(--border);
      box-shadow:var(--shadow);padding:20px;
    }
    .hol-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
    .hol-item{
      display:flex;align-items:flex-start;gap:0;
      padding:8px 10px;border-radius:4px;
      background:var(--red-light);border-left:3px solid var(--red)
    }
    .hol-dot{display:none}
    .hol-date{font-size:.6875rem;font-weight:500;color:var(--red);letter-spacing:.01em}
    .hol-name{font-size:.75rem;color:var(--ink2);margin-top:1px}
    .hol-empty{
      font-size:.8rem;color:var(--teal);font-weight:500;
      display:flex;align-items:center;gap:6px;padding:8px 0
    }

    /* ── Brückentage panel ── */
    .bruecken-panel{display:flex;flex-direction:column;gap:0}
    .bruecken-subtitle{font-size:.8rem;color:var(--ink3);margin-bottom:20px;font-weight:400}
    .bruecken-list{display:flex;flex-direction:column;gap:10px;max-height:600px;overflow-y:auto;padding-right:6px}
    .bruecken-item{
      padding:16px 18px;border-radius:8px;
      background:var(--surface);border:1px solid var(--border);
      border-left:4px solid var(--border);
      transition:box-shadow .15s;
    }
    .bruecken-item:hover{box-shadow:var(--shadow)}
    .bruecken-item.has-bridge{border-left-color:var(--teal);background:var(--teal-light)}
    .bruecken-item.long-weekend{border-left-color:var(--blue);background:var(--blue-light)}
    .bruecken-item.weekend-hol{opacity:.45}
    .bruecken-date{font-size:.6875rem;font-weight:500;letter-spacing:.03em;color:var(--ink3);margin-bottom:4px}
    .bruecken-item.has-bridge .bruecken-date{color:var(--teal)}
    .bruecken-item.long-weekend .bruecken-date{color:var(--accent)}
    .bruecken-name{font-size:.9375rem;font-weight:500;color:var(--ink);line-height:1.3}
    .bridge-badge{
      display:flex;align-items:flex-start;gap:7px;
      margin-top:10px;padding:8px 12px;
      background:rgba(15,157,88,.1);border-radius:6px;
      font-size:.8rem;color:var(--teal);font-weight:500;line-height:1.5
    }
    .long-badge{
      display:flex;align-items:flex-start;gap:7px;
      margin-top:10px;padding:8px 12px;
      background:rgba(26,115,232,.08);border-radius:6px;
      font-size:.8rem;color:var(--accent);font-weight:500;line-height:1.5
    }
    .weekend-badge{
      display:flex;align-items:flex-start;gap:7px;
      margin-top:10px;padding:8px 12px;
      background:rgba(128,134,139,.08);border-radius:6px;
      font-size:.8rem;color:var(--ink3);font-weight:500;line-height:1.5
    }

    /* ── Responsive ── */
    @media(max-width:900px){
      .layout{grid-template-columns:1fr}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .bottom-split{grid-template-columns:1fr}
      .page-sub{display:none}
    }
    @media(max-width:480px){
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      body{padding:0 0 40px}
      .layout{padding:0 12px}
    }
  </style>
</head>
<body>

<div class="page-header">
  <div class="header-icon">✈️</div>
  <div class="page-title">Urlaubs-Manager</div>
  <div class="page-sub">Alle 16 Bundesländer · Feiertage automatisch berücksichtigt</div>
</div>

<div class="layout">

  <!-- LEFT: Input -->
  <div>
    <div class="panel">
      <div class="panel-title">🗓️ Schritt 1: Daten eingeben <span id="bl-badge">MV</span></div>

      <div class="field">
        <label>Bundesland</label>
        <div class="select-wrap">
          <select id="bundesland">
            <option value="BB">Brandenburg</option>
            <option value="BE">Berlin</option>
            <option value="BW">Baden-Württemberg</option>
            <option value="BY">Bayern</option>
            <option value="HB">Bremen</option>
            <option value="HE">Hessen</option>
            <option value="HH">Hamburg</option>
            <option value="MV" selected>Mecklenburg-Vorpommern</option>
            <option value="NI">Niedersachsen</option>
            <option value="NW">Nordrhein-Westfalen</option>
            <option value="RP">Rheinland-Pfalz</option>
            <option value="SH">Schleswig-Holstein</option>
            <option value="SL">Saarland</option>
            <option value="SN">Sachsen</option>
            <option value="ST">Sachsen-Anhalt</option>
            <option value="TH">Thüringen</option>
          </select>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>

      <div class="field">
        <label>Startdatum</label>
        <div class="date-input-wrap">
          <input type="date" id="start"/>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
      </div>

      <div class="field">
        <label>Enddatum</label>
        <div class="date-input-wrap">
          <input type="date" id="end"/>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
      </div>

      <button class="btn" onclick="calculate()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Urlaub berechnen
      </button>
      <div class="error" id="error"></div>
    </div>
  </div>

  <!-- RIGHT: Results -->
  <div class="right-panel" id="right-panel">
    <!-- filled by renderBrueckentagePanel() on load -->
  </div>

</div>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────
function getEaster(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  return new Date(y,Math.floor((h+l-7*m+114)/31)-1,(h+l-7*m+114)%31+1);
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function toKey(d){return d.toISOString().slice(0,10);}

// ── Holiday data per Bundesland ────────────────────────────────────────────
// Each function returns {dateKey: "Feiertagsname"}
function getHolidays(bl, y){
  const e=getEaster(y), h={};
  const a=(d,name)=>{h[toKey(d)]=name;};

  // Bundesweite Feiertage (alle Länder)
  a(new Date(y,0,1),   "Neujahr");
  a(addDays(e,-2),     "Karfreitag");
  a(addDays(e,0),      "Ostersonntag");
  a(addDays(e,1),      "Ostermontag");
  a(new Date(y,4,1),   "Tag der Arbeit");
  a(addDays(e,39),     "Christi Himmelfahrt");
  a(addDays(e,49),     "Pfingstsonntag");
  a(addDays(e,50),     "Pfingstmontag");
  a(new Date(y,9,3),   "Tag der Deutschen Einheit");
  a(new Date(y,11,25), "1. Weihnachtstag");
  a(new Date(y,11,26), "2. Weihnachtstag");

  // Landesspezifische Feiertage
  switch(bl){
    case 'BW':
      a(addDays(e,60),     "Fronleichnam");
      a(new Date(y,0,6),   "Heilige Drei Könige");
      a(new Date(y,10,1),  "Allerheiligen");
      break;
    case 'BY':
      a(addDays(e,60),     "Fronleichnam");
      a(new Date(y,0,6),   "Heilige Drei Könige");
      a(new Date(y,7,15),  "Mariä Himmelfahrt");
      a(new Date(y,10,1),  "Allerheiligen");
      break;
    case 'BE':
      a(new Date(y,4,8),   "Tag der Befreiung"); // seit 2025
      break;
    case 'BB':
      a(addDays(e,-46),    "Reformationssonntag (Bußtag-Region)");
      a(new Date(y,9,31),  "Reformationstag");
      break;
    case 'HB':
      a(new Date(y,9,31),  "Reformationstag");
      break;
    case 'HH':
      a(new Date(y,9,31),  "Reformationstag");
      break;
    case 'HE':
      a(addDays(e,60),     "Fronleichnam");
      break;
    case 'MV':
      a(new Date(y,9,31),  "Reformationstag");
      break;
    case 'NI':
      a(new Date(y,9,31),  "Reformationstag");
      break;
    case 'NW':
      a(addDays(e,60),     "Fronleichnam");
      a(new Date(y,10,1),  "Allerheiligen");
      break;
    case 'RP':
      a(addDays(e,60),     "Fronleichnam");
      a(new Date(y,10,1),  "Allerheiligen");
      break;
    case 'SL':
      a(addDays(e,60),     "Fronleichnam");
      a(new Date(y,7,15),  "Mariä Himmelfahrt");
      a(new Date(y,10,1),  "Allerheiligen");
      break;
    case 'SN':
      a(new Date(y,9,31),  "Reformationstag");
      // Buß- und Bettag: Mittwoch vor dem 23. November
      a(getBussUndBettag(y),"Buß- und Bettag");
      break;
    case 'ST':
      a(new Date(y,0,6),   "Heilige Drei Könige");
      a(new Date(y,9,31),  "Reformationstag");
      break;
    case 'SH':
      a(new Date(y,9,31),  "Reformationstag");
      break;
    case 'TH':
      a(new Date(y,9,31),  "Reformationstag");
      a(new Date(y,8,20),  "Weltkindertag");
      break;
  }
  return h;
}

function getBussUndBettag(y){
  // Mittwoch vor dem 23. November
  const nov23=new Date(y,10,23);
  const dow=nov23.getDay(); // 0=So
  // Tage zurück bis Mittwoch (3)
  const diff=(dow>=3)?(dow-3):(dow+4);
  return addDays(nov23,-diff);
}

const BL_NAMES={
  BB:"Brandenburg",BE:"Berlin",BW:"Baden-Württemberg",BY:"Bayern",
  HB:"Bremen",HE:"Hessen",HH:"Hamburg",MV:"Mecklenburg-Vorpommern",
  NI:"Niedersachsen",NW:"Nordrhein-Westfalen",RP:"Rheinland-Pfalz",
  SH:"Schleswig-Holstein",SL:"Saarland",SN:"Sachsen",ST:"Sachsen-Anhalt",TH:"Thüringen"
};

const DE_MONTHS=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const fmtShort=new Intl.DateTimeFormat('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'});

// ── Brückentage overview ───────────────────────────────────────────────────
function renderBrueckentagePanel(bl){
  const rp=document.getElementById('right-panel');
  const today=new Date(); today.setHours(0,0,0,0);
  const yr=today.getFullYear();

  const allH=Object.assign({},getHolidays(bl,yr),getHolidays(bl,yr+1));

  const upcoming=Object.entries(allH)
    .map(([key,name])=>({date:new Date(key+'T00:00:00'),name,key}))
    .filter(h=>h.date>=today)
    .sort((a,b)=>a.date-b.date)
    .slice(0,16);

  const fmtFull=new Intl.DateTimeFormat('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const fmtDay =new Intl.DateTimeFormat('de-DE',{weekday:'long',day:'2-digit',month:'long'});

  const itemsHTML=upcoming.map(h=>{
    const dow=h.date.getDay(); // 0=So,1=Mo,2=Di,3=Mi,4=Do,5=Fr,6=Sa
    let extra='', cls='bruecken-item';

    if(dow===0||dow===6){
      cls+=' weekend-hol';
      extra=`<div class="weekend-badge">⚠️ Fällt aufs Wochenende</div>`;
    } else if(dow===1){
      cls+=' long-weekend';
      extra=`<div class="long-badge">🎉 Langes Wochenende · 3 Tage frei, 0 Urlaubstage</div>`;
    } else if(dow===5){
      cls+=' long-weekend';
      extra=`<div class="long-badge">🎉 Langes Wochenende · 3 Tage frei, 0 Urlaubstage</div>`;
    } else if(dow===2){
      const bd=addDays(h.date,-1);
      if(!allH[toKey(bd)]){
        cls+=' has-bridge';
        extra=`<div class="bridge-badge">🌉 Brückentag ${fmtDay.format(bd)} → <strong>4 Tage frei</strong>, nur 1 Urlaubstag</div>`;
      }
    } else if(dow===4){
      const bd=addDays(h.date,1);
      if(!allH[toKey(bd)]){
        cls+=' has-bridge';
        extra=`<div class="bridge-badge">🌉 Brückentag ${fmtDay.format(bd)} → <strong>4 Tage frei</strong>, nur 1 Urlaubstag</div>`;
      }
    }

    return `<div class="${cls}">
      <div class="bruecken-date">${fmtFull.format(h.date)}</div>
      <div class="bruecken-name">${h.name}</div>
      ${extra}
    </div>`;
  }).join('');

  rp.innerHTML=`<div class="panel bruecken-panel">
    <div class="panel-title">🌉 Feiertage &amp; Brückentage <span>${bl}</span></div>
    <div class="bruecken-subtitle">Optimale Urlaubsplanung für ${BL_NAMES[bl]||bl}</div>
    <div class="bruecken-list">${itemsHTML}</div>
  </div>`;
}

// Update badge + bridge panel when dropdown changes
document.getElementById('bundesland').addEventListener('change',function(){
  document.getElementById('bl-badge').textContent=this.value;
  renderBrueckentagePanel(this.value);
});

// ── Main calculation ───────────────────────────────────────────────────────
function calculate(){
  const sv=document.getElementById('start').value;
  const ev=document.getElementById('end').value;
  const bl=document.getElementById('bundesland').value;
  const errEl=document.getElementById('error');
  errEl.style.display='none';

  if(!sv||!ev){showError("Bitte beide Daten auswählen.");return;}
  const start=new Date(sv+'T00:00:00');
  const end=new Date(ev+'T00:00:00');
  if(end<start){showError("Das Enddatum muss nach dem Startdatum liegen.");return;}

  const years=new Set();
  let cur=new Date(start);
  while(cur<=end){years.add(cur.getFullYear());cur.setDate(cur.getDate()+1);}
  const allH={};
  years.forEach(y=>Object.assign(allH,getHolidays(bl,y)));

  let total=0,weekends=0,hols=0,vacation=0;
  const hitH=[];
  cur=new Date(start);
  while(cur<=end){
    total++;
    const dow=cur.getDay(),key=toKey(cur);
    if(dow===0||dow===6) weekends++;
    else if(allH[key]){hols++;hitH.push({date:new Date(cur),name:allH[key]});}
    else vacation++;
    cur.setDate(cur.getDate()+1);
  }

  renderResults({start,end,total,weekends,hols,vacation,hitH,allH,bl});
}

function showError(msg){
  const el=document.getElementById('error');
  el.textContent=msg;el.style.display='block';
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderResults({start,end,total,weekends,hols,vacation,hitH,allH,bl}){
  const rp=document.getElementById('right-panel');

  const statsHTML=`
  <div class="stats-grid">
    <div class="stat-card s-total">
      <div class="stat-icon">📅</div>
      <div class="stat-label">Gesamt-<br>zeitraum</div>
      <div class="stat-value">${total}</div>
      <div class="stat-unit">Tage</div>
    </div>
    <div class="stat-card s-vacation">
      <div class="stat-icon">🧳</div>
      <div class="stat-label">Benötigte<br>Urlaubstage</div>
      <div class="stat-value">${vacation}</div>
      <div class="stat-unit">Arbeitstage</div>
    </div>
    <div class="stat-card s-weekend">
      <div class="stat-icon">😴</div>
      <div class="stat-label">Wochen-<br>enden</div>
      <div class="stat-value">${weekends}</div>
      <div class="stat-unit">Tage</div>
    </div>
    <div class="stat-card s-holiday">
      <div class="stat-icon">🎉</div>
      <div class="stat-label">Feiertage<br>&nbsp;</div>
      <div class="stat-value">${hols}</div>
      <div class="stat-unit">Tage</div>
    </div>
  </div>`;

  const calHTML=buildCalendar(start,end,allH,bl);

  const holListHTML=`
  <div class="hol-panel">
    <div class="panel-title">🎉 Feiertage</div>
    <div class="hol-list">
      ${hitH.length===0
        ? `<div class="hol-empty">✅ Keine Feiertage</div>`
        : hitH.map(h=>`
          <div class="hol-item">
            <div class="hol-dot"></div>
            <div class="hol-info">
              <div class="hol-date">${fmtShort.format(h.date)}</div>
              <div class="hol-name">${h.name}</div>
            </div>
          </div>`).join('')}
    </div>
  </div>`;

  rp.innerHTML=`
    <div class="bottom-split">
      ${calHTML}
      ${holListHTML}
    </div>
    ${statsHTML}`;
}

// ── Calendar builder ───────────────────────────────────────────────────────
function buildCalendar(start,end,allH,bl){
  const months=[];
  const seen=new Set();
  let cur=new Date(start.getFullYear(),start.getMonth(),1);
  const endMonth=new Date(end.getFullYear(),end.getMonth(),1);
  while(cur<=endMonth){
    const key=`${cur.getFullYear()}-${cur.getMonth()}`;
    if(!seen.has(key)){seen.add(key);months.push(new Date(cur));}
    cur.setMonth(cur.getMonth()+1);
  }

  const today=toKey(new Date());

  const monthsHTML=months.map(m=>{
    const y=m.getFullYear(),mo=m.getMonth();
    const firstDow=(new Date(y,mo,1).getDay()+6)%7;
    const daysInMonth=new Date(y,mo+1,0).getDate();

    let cells='';
    for(let i=0;i<firstDow;i++) cells+=`<div class="cal-day empty"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const date=new Date(y,mo,d);
      const key=toKey(date);
      const dow=date.getDay();
      const inRange=date>=start&&date<=end;
      const isHol=!!allH[key];
      const isWe=dow===0||dow===6;
      const isToday=key===today;

      let cls='cal-day';
      if(isWe) cls+=' weekend';
      if(inRange&&!isWe) cls+=' in-range';
      if(inRange&&isHol&&!isWe) cls+=' holiday';
      if(isWe&&inRange) cls+=' in-range';
      if(isToday) cls+=' today';

      const title=isHol?allH[key]:'';
      cells+=`<div class="${cls}" title="${title}">${d}${isHol&&inRange&&!isWe?'<br><span style="font-size:.5rem;line-height:1;display:block">●</span>':''}</div>`;
    }

    const dowHeaders=['Mo','Di','Mi','Do','Fr','Sa','So'].map((d,i)=>
      `<div class="cal-dow${i>=5?' weekend':''}">${d}</div>`).join('');

    return `
      <div class="cal-month">
        <div class="cal-month-title">📅 ${DE_MONTHS[mo]} ${y}</div>
        <div class="cal-grid">${dowHeaders}${cells}</div>
      </div>`;
  }).join('');

  return `
    <div class="cal-panel">
      <div class="panel-title">🗓️ Schritt 2: Deine Übersicht <span style="font-size:.65rem;background:var(--blue-light);color:var(--accent);border-radius:6px;padding:2px 8px;">${BL_NAMES[bl]||bl}</span></div>
      <div class="cal-months">${monthsHTML}</div>
      <div style="margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:14px">
        <div style="display:flex;align-items:center;gap:6px;font-size:.6875rem;color:var(--ink2);font-weight:500">
          <div style="width:12px;height:12px;border-radius:3px;background:var(--teal-mid);border-left:3px solid var(--teal)"></div>Urlaubstag
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:.6875rem;color:var(--ink2);font-weight:500">
          <div style="width:12px;height:12px;border-radius:3px;background:var(--red-mid);border-left:3px solid var(--red)"></div>Feiertag
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:.6875rem;color:var(--ink2);font-weight:500">
          <div style="width:12px;height:12px;border-radius:3px;background:var(--blue-mid);border-left:3px solid var(--blue)"></div>Wochenende
        </div>
      </div>
    </div>`;
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')calculate();});

// Init bridge day panel on load
renderBrueckentagePanel(document.getElementById('bundesland').value);
</script>
